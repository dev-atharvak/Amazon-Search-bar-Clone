<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

        <img src="image.png" alt="">

        <h6>Deliver to Atharva</h6>
        <h4><i id="icon" class="fa-solid fa-location-dot fa-lg"></i> Nagpur 4400XX</h4>
        </div>
        <select id="all">
        <option value="all">All</option>
        <option value="electronics">Electronics</option>
        <option value="clothing">Clothing</option>
        <option value="home">Home</option>
        <option value="books">Books</option>
        <option value="toys">Toys</option>
        <option value="sports">Sports</option>
        <option value="beauty">Beauty</option>
        <option value="automotive">Automotive</option>
        <option value="grocery">Grocery</option>
        <option value="health">Health</option>
        <option value="garden">Garden</option>
        <option value="pet">Pet Supplies</option>
        <option value="office">Office Products</option>
        <option value="baby">Baby Products</option>
        <option value="music">Music</option>
        <option value="movies">Movies & TV</option>
        <option value="video-games">Video Games</option>
        <option value="software">Software</option>
        <option value="tools">Tools & Home Improvement</option>
        <option value="industrial">Industrial & Scientific</option>
        <option value="luggage">Luggage & Travel Gear</option>
        <option value="handmade">Handmade</option>
        <option value="gift-cards">Gift Cards</option>
        <option value="luxury">Luxury Beauty</option>
        <option value="collectibles">Collectibles & Fine Art</option>
        <option value="appliances">Appliances</option>
        

    </select>
        <input id="search-input" type="text" placeholder="Search Amazon.in">
        <button id="search"><i class="fa-solid fa-magnifying-glass"></i></button>
        <img id="flag" src="amazon-INflag.png" alt="Amazon IN Flag">
        <div id="greet">
        <p id="user-greeting">Hello, Atharva</p><br>
        <h4 id="account" >Account & Lists <i class="fa-solid fa-caret-down"></i></h4>
        </div>
        <p id="returns">Returns </p>
        <h4 id="orders">& Orders</h4>
        <h1 id="cart"><i class="fa-solid fa-cart-shopping fa-lg"></i></h1>
        <h5 id="cart-text">Cart</h5>
        <h6 id="zero">0</h6>
    </div>
